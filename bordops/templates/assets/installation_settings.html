{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0">Paramètres – {{ object.designation }}</h1>
  <div class="d-flex gap-2">
    <a class="btn btn-secondary" href="/installations/{{ object.id }}/">Retour à l'installation</a>
  </div>
</div>
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-12"><strong>Échéances mesure de vibration</strong></div>
        <div class="col-md-4">
          <label class="form-label">État A (jours)</label>
          <input type="number" min="1" class="form-control" name="vib_days_a" value="{{ vib_days_a }}" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">État B (jours)</label>
          <input type="number" min="1" class="form-control" name="vib_days_b" value="{{ vib_days_b }}" required />
        </div>
        <div class="col-md-4">
          <label class="form-label">État C (jours)</label>
          <input type="number" min="1" class="form-control" name="vib_days_c" value="{{ vib_days_c }}" required />
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="/installations/{{ object.id }}/" class="btn btn-outline-secondary ms-2">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
