{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">Mon profil</h1>
<form method="post" class="card card-body">
  {% csrf_token %}
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Grade</label>
      <input type="text" name="grade" value="{{ form.instance.grade }}" list="gradesList" class="form-control" />
      <datalist id="gradesList">
        {% for g in grades %}<option value="{{ g.name }}" />{% endfor %}
      </datalist>
    </div>
    <div class="col-md-4">
      <label class="form-label">Spécialité</label>
      <input type="text" name="specialite" value="{{ form.instance.specialite }}" list="specialitesList" class="form-control" />
      <datalist id="specialitesList">
        {% for s in specialites %}<option value="{{ s.name }}" />{% endfor %}
      </datalist>
    </div>
    <div class="col-md-4">
      <label class="form-label">Matricule</label>
      {{ form.matricule }}
    </div>
    <div class="col-md-4">
      <label class="form-label">Rôle</label>
      {{ form.role }}
    </div>
    <div class="col-md-4">
      <label class="form-label">Navire</label>
      {{ form.ship }}
    </div>
    <div class="col-md-4">
      <label class="form-label">Service</label>
      {{ form.service }}
    </div>
    <div class="col-md-4">
      <label class="form-label">Secteur</label>
      {{ form.sector }}
    </div>
    <div class="col-md-4">
      <label class="form-label">Section</label>
      {{ form.section }}
    </div>
    <div class="col-12">
      <label class="form-label">Secteurs autorisés</label>
      {{ form.allowed_sectors }}
    </div>
  </div>
  <div class="mt-3">
    <button class="btn btn-primary" type="submit">Enregistrer</button>
    <a class="btn btn-outline-secondary" href="/users/">Retour</a>
  </div>
</form>
{% endblock %}
