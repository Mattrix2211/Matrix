<div class="card">
  <div class="card-header">Statut</div>
  <div class="card-body d-flex align-items-center">
    <span class="badge bg-info me-3">{{ ticket.status }}</span>
    <form hx-post="/logistics/tickets/{{ ticket.id }}/transition/" hx-target="#ticket-status" hx-swap="outerHTML" class="d-flex gap-2">
      <select class="form-select form-select-sm" name="status" style="width: 220px;">
        {% for s in 'REPORTED,DIAGNOSED,WAITING_PARTS,PLANNED,IN_REPAIR,TESTING,RETURNED_TO_SERVICE,CLOSED,BLOCKED,CANCELLED'.split(',') %}
          <option value="{{ s }}" {% if s == ticket.status %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
      </select>
      <button class="btn btn-sm btn-primary" type="submit">Changer</button>
      <a class="btn btn-sm btn-outline-secondary" href="/api/logistics/tickets/{{ ticket.id }}/" target="_blank">API</a>
    </form>
  </div>
</div>
