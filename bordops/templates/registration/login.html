<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion • Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body{background:#f5f7fb;}
      .login-card{max-width:420px;margin:8vh auto;}
    </style>
  </head>
  <body>
    <h1 class="text-center mt-5 mb-3">Matrix</h1>
    <div class="card shadow-sm login-card">
      <div class="card-body">
        <h3 class="mb-3 text-center">Connexion</h3>
        {% if form.errors %}
          <div class="alert alert-danger">Identifiants invalides, réessayez.</div>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Utilisateur</label>
            {{ form.username }}
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            {{ form.password }}
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button class="btn btn-primary w-100" type="submit">Se connecter</button>
        </form>
      </div>
      <div class="card-footer text-center small text-muted">BordOps</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
